<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - No Encontrada</title>
    <link rel="stylesheet" href="../css/styles.css">
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-gray-50">

    <div class="text-center px-4">
        <div class="inline-flex items-center justify-center h-20 w-20 rounded-full mb-6 bg-[#69B22E20]">
            <i data-lucide="file-question" class="h-10 w-10 text-[#69B22E]"></i>
        </div>
        <h1 class="text-6xl mb-4 font-semibold text-[#7B5936]">404</h1>
        <h2 class="text-2xl mb-4 font-medium text-[#7B5936]">Página No Encontrada</h2>
        <p class="text-gray-600 mb-8 max-w-md mx-auto">
            Lo sentimos, la página que estás buscando no existe o ha sido movida.
        </p>
        <a href="login.html" class="inline-block px-6 py-3 rounded-md text-white font-medium hover:opacity-90 transition-opacity bg-[#69B22E]">
            Volver al Inicio
        </a>
    </div>

    <script>
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }
    </script>
</body>
</html>
