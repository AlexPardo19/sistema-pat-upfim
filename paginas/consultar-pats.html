<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultar PATs - Sistema PAT</title>
    <link rel="stylesheet" href="../css/styles.css">
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
</head>
<body class="bg-gray-50">

    <div class="flex h-screen overflow-hidden">
        
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-white border-r border-gray-200 transform -translate-x-full lg:translate-x-0 lg:static transition-transform duration-300 flex flex-col">
            <div class="p-6 border-b border-gray-200 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <img src="../assets/logoUpfim.png" alt="UPFIM" class="h-10 w-auto" />
                    <span class="font-semibold text-[#7B5936]">Sistema PAT</span>
                </div>
                <button onclick="toggleMenu()" class="lg:hidden">
                    <i data-lucide="x" class="h-6 w-6 text-gray-600"></i>
                </button>
            </div>

            <nav class="flex-1 p-4 space-y-2">
                <a href="asignacion-tutores.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-100 transition-colors">
                    <i data-lucide="user-plus" class="h-5 w-5"></i>
                    <span>Asignación de Tutores</span>
                </a>
                <a href="alta-docentes.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-100 transition-colors">
                    <i data-lucide="users" class="h-5 w-5"></i>
                    <span>Alta de Docentes</span>
                </a>
                <a href="consultar-pats.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-100 transition-colors">
                    <i data-lucide="file-check-2" class="h-5 w-5"></i>
                    <span>Consultar PATs</span>
                </a>
                <a href="descargar-pats.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-100 transition-colors">
                    <i data-lucide="download" class="h-5 w-5"></i>
                    <span>Descargar PATs</span>
                </a>
            </nav>

            <div class="p-4 border-t border-gray-200">
                <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-100 transition-colors">
                    <i data-lucide="log-out" class="h-5 w-5"></i>
                    <span>Cerrar Sesión</span>
                </button>
            </div>
        </aside>

        <div id="mobile-overlay" onclick="toggleMenu()" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden lg:hidden"></div>

        <div class="flex-1 flex flex-col h-screen overflow-hidden">
            
            <header class="bg-white border-b border-gray-200 px-6 py-4 flex-shrink-0">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <button onclick="toggleMenu()" class="lg:hidden">
                            <i data-lucide="menu" class="h-6 w-6 text-gray-600"></i>
                        </button>
                        <div>
                            <h1 class="text-2xl text-[#7B5936]">Consultar PATs</h1>
                            <p class="text-sm text-gray-500 mt-1">Revisa los planes de acción tutorial de tu carrera</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="text-right hidden sm:block">
                            <p id="user-role-display" class="text-sm font-medium text-[#7B5936]">Cargando...</p>
                            <p id="user-email-display" class="text-xs text-gray-500">Cargando...</p>
                        </div>
                        <div class="h-10 w-10 rounded-full flex items-center justify-center text-white bg-[#69B22E]">
                            <span id="user-avatar-letter">U</span>
                        </div>
                    </div>
                </div>
            </header>

            <main class="flex-1 overflow-auto p-6">
                <div class="max-w-6xl mx-auto bg-white rounded-lg border border-gray-200 shadow-sm">
                    <div class="px-6 py-4 border-b border-gray-200">
                        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                            <h2 class="text-lg text-[#7B5936]" id="titulo-tabla">PATs de mi Carrera</h2>
                            <select id="filtro-estado" onchange="cargarPats()" class="border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:border-[#69B22E] w-full md:w-48">
                                <option value="">Todos los estados</option>
                                <option value="Aprobado">Aprobados</option>
                                <option value="Pendiente Revision">Pendientes</option>
                                <option value="Rechazado">Rechazados</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="overflow-x-auto p-6">
                        <table class="w-full text-sm text-left">
                            <thead class="text-xs text-[#7B5936] uppercase bg-gray-50 border-b">
                                <tr>
                                    <th class="px-4 py-3">Tutor</th>
                                    <th class="px-4 py-3">Grupo</th>
                                    <th class="px-4 py-3">Periodo</th>
                                    <th class="px-4 py-3 text-center">Alumnos</th>
                                    <th class="px-4 py-3 text-center">Estado</th>
                                    <th class="px-4 py-3 text-center">Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="pats-tbody" class="divide-y divide-gray-200">
                                <tr><td colspan="6" class="px-4 py-8 text-center text-gray-400"><i data-lucide="loader-2" class="h-5 w-5 animate-spin inline mr-2"></i>Cargando...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/pdf-utils.js"></script>
    <script>
        const API = 'http://localhost:5000/api';
        const session = typeof window.getSessionData === 'function' ? window.getSessionData() : null;
        const miCarrera = (session && session.departamento) || '';

        async function cargarPats() {
            const tbody = document.getElementById('pats-tbody');
            tbody.innerHTML = `<tr><td colspan="6" class="px-4 py-6 text-center text-gray-400"><i data-lucide="loader-2" class="h-4 w-4 animate-spin inline mr-1"></i> Cargando...</td></tr>`;
            if (typeof lucide !== 'undefined') lucide.createIcons();
            try {
                const params = new URLSearchParams();
                const estado = document.getElementById('filtro-estado').value;
                if (estado) params.append('estado', estado);
                if (miCarrera) params.append('carrera', miCarrera);

                const res = await fetch(`${API}/pats?${params.toString()}`);
                const data = await res.json();

                if (data.success && data.pats.length > 0) {
                    document.getElementById('titulo-tabla').innerText = `PATs de mi Carrera (${data.pats.length})`;
                    tbody.innerHTML = data.pats.map(pat => {
                        const cfg = { 'Aprobado': 'bg-green-100 text-green-800 border-green-300', 'Pendiente Revision': 'bg-yellow-100 text-yellow-800 border-yellow-300', 'Rechazado': 'bg-red-100 text-red-800 border-red-300' };
                        const bc = cfg[pat.estado] || 'bg-gray-100 text-gray-800 border-gray-300';
                        return `<tr class="hover:bg-gray-50">
                            <td class="px-4 py-3 font-medium">${pat.tutor}</td>
                            <td class="px-4 py-3 font-bold">${pat.grupo}</td>
                            <td class="px-4 py-3 text-gray-600">${pat.periodo}</td>
                            <td class="px-4 py-3 text-center">${(pat.alumnos_h||0)+(pat.alumnos_m||0)}</td>
                            <td class="px-4 py-3 text-center"><span class="px-2.5 py-0.5 rounded-full text-xs font-medium border ${bc}">${pat.estado}</span></td>
                            <td class="px-4 py-3 text-center"><div class="flex gap-2 justify-center">
                                <a href="pat-detail.html?id=${pat.id}" class="px-3 py-1 text-sm border border-[#69B22E] text-[#69B22E] rounded-md hover:bg-[#69B22E] hover:text-white transition-colors">Ver</a>
                                <button onclick="descargarPDF(${pat.id},event)" class="px-3 py-1 text-sm bg-gray-900 text-white rounded-md hover:bg-black transition-colors"><i data-lucide="file-down" class="h-3 w-3 inline mr-1"></i>PDF</button>
                            </div></td></tr>`;
                    }).join('');
                } else {
                    document.getElementById('titulo-tabla').innerText = 'PATs de mi Carrera (0)';
                    tbody.innerHTML = `<tr><td colspan="6" class="px-4 py-8 text-center text-gray-400 italic">No se encontraron PATs.</td></tr>`;
                }
                if (typeof lucide !== 'undefined') lucide.createIcons();
            } catch(e) { tbody.innerHTML = `<tr><td colspan="6" class="px-4 py-6 text-center text-red-400">Sin conexión con el servidor.</td></tr>`; }
        }

        async function descargarPDF(patId, event) {
            const btn = event.currentTarget;
            const orig = btn.innerHTML;
            btn.innerHTML = `<i data-lucide="loader-2" class="h-3 w-3 inline animate-spin"></i>`;
            if (typeof lucide !== 'undefined') lucide.createIcons();
            try {
                const res = await fetch(`${API}/pats/${patId}`);
                const data = await res.json();
                if (!data.success) { alert('Error al obtener PAT'); btn.innerHTML = orig; return; }
                const p = data.pat;
                generarPDFPat({
                    carrera: p.carrera || miCarrera,
                    tutor: p.tutor,
                    grupo: p.grupo,
                    periodo: p.periodo,
                    h: p.alumnos_h || 0,
                    m: p.alumnos_m || 0,
                    sesiones: p.sesiones,
                    tipo: 'completo',
                    filename: `PAT_${p.grupo}_${p.tutor.replace(/ /g, '_')}.pdf`
                });
                btn.innerHTML = orig;
                if (typeof lucide !== 'undefined') lucide.createIcons();
            } catch (e) { alert('Error de conexión.'); btn.innerHTML = orig; }
        }

        cargarPats();
    </script>
</body>
</html>
