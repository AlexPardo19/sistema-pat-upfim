<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle PAT - Sistema PAT</title>
    <link rel="stylesheet" href="../css/styles.css">
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50">
    <div class="flex h-screen overflow-hidden">
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-white border-r border-gray-200 transform -translate-x-full lg:translate-x-0 lg:static transition-transform duration-300 flex flex-col">
            <div class="p-6 border-b border-gray-200 flex items-center justify-between">
                <div class="flex items-center gap-3"><img src="../assets/logoUpfim.png" alt="UPFIM" class="h-10 w-auto" /><span class="font-semibold text-[#7B5936]">Sistema PAT</span></div>
                <button onclick="toggleMenu()" class="lg:hidden"><i data-lucide="x" class="h-6 w-6 text-gray-600"></i></button>
            </div>
            <nav class="flex-1 p-4 space-y-2">
                <a href="consultar-pats.html" class="nav-link flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-100"><i data-lucide="file-check-2" class="h-5 w-5"></i><span>Consultar PATs</span></a>
                <a href="descargar-pats.html" class="nav-link flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-100"><i data-lucide="download" class="h-5 w-5"></i><span>Descargar PATs</span></a>
            </nav>
            <div class="p-4 border-t border-gray-200"><button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-100"><i data-lucide="log-out" class="h-5 w-5"></i><span>Cerrar Sesión</span></button></div>
        </aside>
        <div id="mobile-overlay" onclick="toggleMenu()" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden lg:hidden"></div>
        <div class="flex-1 flex flex-col h-screen overflow-hidden">
            <header class="bg-white border-b border-gray-200 px-6 py-4 flex-shrink-0">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <button onclick="toggleMenu()" class="lg:hidden"><i data-lucide="menu" class="h-6 w-6 text-gray-600"></i></button>
                        <div><h1 class="text-2xl text-[#7B5936]">Detalle de PAT</h1></div>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="text-right hidden sm:block"><p id="user-role-display" class="text-sm font-medium text-[#7B5936]"></p><p id="user-email-display" class="text-xs text-gray-500"></p></div>
                        <div class="h-10 w-10 rounded-full flex items-center justify-center text-white bg-[#69B22E]"><span id="user-avatar-letter">U</span></div>
                    </div>
                </div>
            </header>
            <main class="flex-1 overflow-auto p-6">
                <div class="max-w-4xl mx-auto space-y-6">
                    <button onclick="window.history.back()" class="flex items-center px-4 py-2 border border-[#7B5936] text-[#7B5936] rounded-md hover:bg-[#7B5936] hover:text-white w-fit"><i data-lucide="arrow-left" class="h-4 w-4 mr-2"></i> Regresar</button>
                    <div id="pat-loading" class="bg-white rounded-lg border p-8 text-center text-gray-400"><i data-lucide="loader-2" class="h-6 w-6 animate-spin inline mr-2"></i>Cargando...</div>
                    <div id="pat-content" class="hidden space-y-6">
                        <div class="bg-white rounded-lg border shadow-sm p-6">
                            <div class="flex items-start justify-between"><div><h2 class="text-2xl text-[#7B5936]">Plan de Acción Tutorial</h2><p id="pat-id-text" class="text-sm text-gray-500 mt-1"></p></div><span id="pat-estado-badge" class="px-2.5 py-0.5 rounded-full text-xs font-medium border"></span></div>
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-6" id="pat-info-grid"></div>
                        </div>
                        <div class="bg-white rounded-lg border shadow-sm overflow-hidden">
                            <div class="px-6 py-3 bg-gray-50 border-b"><h3 class="font-medium text-[#7B5936]">Sesiones</h3></div>
                            <div class="overflow-x-auto"><table class="w-full text-sm"><thead class="text-xs text-[#7B5936] uppercase bg-gray-50 border-b"><tr><th class="px-3 py-2 text-center">No.</th><th class="px-3 py-2">Corte</th><th class="px-3 py-2">Temática</th><th class="px-3 py-2">Objetivo</th><th class="px-3 py-2">Res. Esperados</th><th class="px-3 py-2 text-center">Estado</th></tr></thead>
                                <tbody id="sesiones-tbody" class="divide-y"></tbody></table></div>
                        </div>
                        <div id="seccion-validacion" class="bg-white rounded-lg border shadow-sm p-6">
                            <h3 class="text-lg mb-4 text-[#7B5936]">Validación</h3>
                            <textarea id="comments" placeholder="Observaciones..." rows="3" class="w-full rounded-md border px-3 py-2 text-sm mb-4"></textarea>
                            <div class="flex justify-end gap-4">
                                <button onclick="handleAction('Rechazado')" class="px-4 py-2 border border-red-600 text-red-600 rounded-md hover:bg-red-600 hover:text-white text-sm"><i data-lucide="x-circle" class="h-4 w-4 inline mr-1"></i> Rechazar</button>
                                <button onclick="handleAction('Aprobado')" class="px-4 py-2 bg-[#69B22E] text-white rounded-md hover:opacity-90 text-sm"><i data-lucide="check-circle" class="h-4 w-4 inline mr-1"></i> Aprobar</button>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="../js/auth.js"></script>
    <script src="../js/layout.js"></script>
    <script>
        const API = 'http://localhost:5000/api';
        const patId = new URLSearchParams(window.location.search).get('id');
        async function cargarPat() {
            if (!patId) { document.getElementById('pat-loading').textContent = 'ID no proporcionado.'; return; }
            try {
                const res = await fetch(`${API}/pats/${patId}`);
                const data = await res.json();
                if (!data.success) { document.getElementById('pat-loading').textContent = 'PAT no encontrado.'; return; }
                const p = data.pat;
                document.getElementById('pat-loading').classList.add('hidden');
                document.getElementById('pat-content').classList.remove('hidden');
                document.getElementById('pat-id-text').textContent = `PAT #${p.id} — ${p.periodo||''}`;
                const cfgE = {'Aprobado':'bg-green-100 text-green-800 border-green-300','Pendiente Revision':'bg-yellow-100 text-yellow-800 border-yellow-300','Rechazado':'bg-red-100 text-red-800 border-red-300','Borrador':'bg-gray-100 text-gray-700 border-gray-300'};
                const b = document.getElementById('pat-estado-badge'); b.textContent = p.estado; b.className = `px-2.5 py-0.5 rounded-full text-xs font-medium border ${cfgE[p.estado]||cfgE.Borrador}`;
                document.getElementById('pat-info-grid').innerHTML = `<div><p class="text-xs text-gray-500">Tutor</p><p class="font-medium text-[#7B5936]">${p.tutor}</p></div><div><p class="text-xs text-gray-500">Grupo</p><p class="font-medium text-[#7B5936]">${p.grupo}</p></div><div><p class="text-xs text-gray-500">Carrera</p><p class="font-medium text-[#7B5936] text-xs">${p.carrera||'—'}</p></div><div><p class="text-xs text-gray-500">Alumnos</p><p class="font-medium text-[#7B5936]">${(p.alumnos_h||0)}H / ${(p.alumnos_m||0)}M</p></div>`;
                const sesiones = p.sesiones||[];
                document.getElementById('sesiones-tbody').innerHTML = sesiones.map(s => {
                    const ce = {'Validada':'bg-green-100 text-green-700','Cancelada':'bg-red-100 text-red-700','Finalizada_Por_Tutor':'bg-yellow-100 text-yellow-700','Programada':'bg-blue-100 text-blue-700'};
                    return `<tr class="hover:bg-gray-50"><td class="px-3 py-2 text-center font-bold">${s.num_sesion}</td><td class="px-3 py-2"><span class="px-1 py-0.5 bg-gray-100 text-[10px] rounded font-bold">${s.corte_parcial||''}</span></td><td class="px-3 py-2">${s.tematica||'—'}</td><td class="px-3 py-2 text-xs text-gray-600">${s.objetivo||'—'}</td><td class="px-3 py-2 text-xs text-gray-600">${s.resultados_esperados||'—'}</td><td class="px-3 py-2 text-center"><span class="px-2 py-0.5 rounded text-[10px] font-bold ${ce[s.estado]||ce.Programada}">${(s.estado||'').replace(/_/g,' ')}</span></td></tr>`;
                }).join('');
                if (p.estado !== 'Pendiente Revision') document.getElementById('seccion-validacion').classList.add('hidden');
            } catch { document.getElementById('pat-loading').textContent = 'Error de conexión.'; }
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }
        async function handleAction(estado) {
            const obs = document.getElementById('comments').value.trim();
            if (estado === 'Rechazado' && !obs) { alert('Observaciones obligatorias al rechazar.'); return; }
            try {
                const res = await fetch(`${API}/pats/${patId}/estado`, { method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify({estado, observaciones: obs}) });
                const data = await res.json();
                alert(data.message);
                if (data.success) window.location.href = 'consultar-pats.html';
            } catch { alert('Error de conexión.'); }
        }
        cargarPat();
    </script>
</body>
</html>
