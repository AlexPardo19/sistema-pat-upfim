<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Director de Carrera - PAT</title><link rel="stylesheet" href="../css/styles.css"><script src="https://unpkg.com/@tailwindcss/browser@4"></script><script src="https://unpkg.com/lucide@latest"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script></head>
<body class="min-h-screen bg-gray-50">
<header class="bg-white border-b sticky top-0 z-10"><div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between"><div class="flex items-center gap-4"><img src="../assets/logoUpfim.png" class="h-12 w-auto"/><div class="border-l border-gray-300 pl-4"><h1 class="text-xl font-semibold text-[#69B22E]">Sistema PAT</h1><p class="text-sm text-gray-600">Director de Carrera</p></div></div><div class="flex items-center gap-4"><div class="text-right hidden sm:block"><p id="user-role-display" class="text-sm font-medium text-[#7B5936]"></p><p id="user-email-display" class="text-xs text-gray-500"></p></div><div class="h-10 w-10 rounded-full flex items-center justify-center text-white bg-[#69B22E]"><span id="user-avatar-letter">D</span></div><button onclick="logout()" class="flex items-center px-3 py-1.5 text-sm border rounded-md hover:text-red-600"><i data-lucide="log-out" class="h-4 w-4 mr-1"></i>Salir</button></div></div></header>
<main class="max-w-7xl mx-auto px-6 py-8"><div class="max-w-6xl mx-auto space-y-6">
<div>
<h1 class="text-3xl text-[#7B5936]">Administracion de Grupos</h1>
<p class="text-sm text-gray-500 mt-1" id="mi-carrera-txt"></p>
<div class="mt-2 inline-flex items-center gap-2 px-3 py-1 bg-blue-50 border border-blue-200 rounded-md text-sm text-blue-800"><i data-lucide="calendar" class="h-4 w-4"></i><span id="periodo-txt"></span></div>
</div>
<!-- TABS -->
<div class="bg-gray-100 border p-1 rounded-xl w-full sm:w-max flex flex-wrap">
<button onclick="sw('doc')" id="tb-doc" class="flex items-center gap-2 px-4 py-2 text-sm font-medium rounded-lg text-[#7B5936] bg-white shadow-sm"><i data-lucide="user-plus" class="h-4 w-4"></i>Alta Docentes</button>
<button onclick="sw('asig')" id="tb-asig" class="flex items-center gap-2 px-4 py-2 text-sm font-medium rounded-lg text-gray-600 hover:text-gray-900"><i data-lucide="users" class="h-4 w-4"></i>Asignacion y PATs</button>
<button onclick="sw('seg')" id="tb-seg" class="flex items-center gap-2 px-4 py-2 text-sm font-medium rounded-lg text-gray-600 hover:text-gray-900"><i data-lucide="activity" class="h-4 w-4"></i>Seguimiento</button>
<button onclick="sw('desc')" id="tb-desc" class="flex items-center gap-2 px-4 py-2 text-sm font-medium rounded-lg text-gray-600 hover:text-gray-900"><i data-lucide="download" class="h-4 w-4"></i>Descargar</button>
</div>

<!-- TAB ALTA DOCENTES -->
<div id="tab-doc" class="space-y-6">
<div class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-5 gap-6">
<div class="md:col-span-2 bg-white rounded-lg border shadow-sm p-6 h-fit">
<h3 class="text-base font-medium text-[#7B5936] mb-4">Registrar Docente</h3>
<form id="form-doc" class="space-y-4">
<div><label class="block text-xs text-gray-500 mb-1">Nombre(s)</label><input id="d-nom" required class="w-full border rounded-md px-3 py-2 text-sm"></div>
<div><label class="block text-xs text-gray-500 mb-1">Apellidos</label><input id="d-ape" required class="w-full border rounded-md px-3 py-2 text-sm"></div>
<div><label class="block text-xs text-gray-500 mb-1">Correo Institucional</label><input id="d-email" type="email" required placeholder="nombre@upfim.edu.mx" class="w-full border rounded-md px-3 py-2 text-sm"></div>
<div><label class="block text-xs text-gray-500 mb-1">Carrera</label><input id="d-carrera" readonly class="w-full border bg-gray-50 text-gray-600 rounded-md px-3 py-2 text-sm cursor-not-allowed"></div>
<div id="d-msg" class="hidden text-sm rounded-md px-3 py-2"></div>
<button type="submit" id="d-btn" class="w-full py-2 bg-[#69B22E] text-white rounded-md text-sm font-medium">Registrar</button>
</form></div>
<div class="md:col-span-3 bg-white rounded-lg border shadow-sm overflow-hidden h-fit">
<div class="px-5 py-3 border-b bg-gray-50 flex items-center justify-between"><h3 class="font-medium text-[#7B5936] text-sm">Docentes de mi Carrera</h3><span id="d-count" class="text-xs text-gray-500"></span></div>
<div class="overflow-x-auto"><table class="w-full text-sm"><thead class="text-xs text-gray-500 uppercase bg-gray-50 border-b"><tr><th class="px-4 py-3">Docente</th><th class="px-4 py-3">Correo</th></tr></thead>
<tbody id="d-tbody" class="divide-y"><tr><td colspan="2" class="px-4 py-6 text-center text-gray-400 text-xs">Cargando...</td></tr></tbody></table></div>
</div></div></div>

<!-- TAB ASIGNACION -->
<div id="tab-asig" class="hidden space-y-6">
<div class="bg-white rounded-lg border shadow-sm p-6">
<h3 class="font-medium text-[#7B5936] mb-4 border-b pb-2">Asignar Tutor a Grupo</h3>
<form id="form-asig" class="space-y-4">
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div><label class="block text-sm font-medium text-gray-700 mb-1">Programa</label><input id="in-prog" readonly class="w-full border bg-gray-50 text-gray-600 rounded-md px-3 py-2 cursor-not-allowed"></div>
<div><label class="block text-sm font-medium text-gray-700 mb-1">Tutor</label><select id="in-tutor" required class="w-full border rounded-md px-3 py-2"><option value="">Cargando...</option></select></div>
<div><label class="block text-sm font-medium text-gray-700 mb-1">Cuatrimestre</label><select id="in-cuat" required class="w-full border rounded-md px-3 py-2"></select></div>
<div><label class="block text-sm font-medium text-gray-700 mb-1">Grupo</label><input id="in-grupo" placeholder="Ej: 2TIG1" required class="w-full border rounded-md px-3 py-2 uppercase"></div>
</div>
<div class="flex justify-end"><button type="submit" class="px-4 py-2 bg-[#69B22E] text-white rounded-md hover:opacity-90 font-medium">Guardar Asignacion</button></div>
</form></div>
<div class="bg-white rounded-lg border shadow-sm overflow-hidden">
<div class="px-6 py-4 border-b bg-gray-50 flex items-center justify-between"><h3 class="font-medium text-[#7B5936]">Asignaciones del Periodo</h3><span class="text-xs text-gray-500">Crea PATs clonando la plantilla publicada</span></div>
<div class="overflow-x-auto"><table class="w-full text-sm"><thead class="text-xs text-[#7B5936] uppercase bg-white border-b"><tr><th class="px-4 py-3">Grupo</th><th class="px-4 py-3">Cuat.</th><th class="px-4 py-3">Tutor</th><th class="px-4 py-3 text-center">PAT</th><th class="px-4 py-3 text-center">Accion</th></tr></thead>
<tbody id="asig-tbody" class="divide-y"></tbody></table></div></div></div>

<!-- TAB SEGUIMIENTO -->
<div id="tab-seg" class="hidden space-y-4"><div id="seg-container" class="space-y-4"></div></div>

<!-- TAB DESCARGAR -->
<div id="tab-desc" class="hidden space-y-6">
<div class="bg-white rounded-lg border shadow-sm overflow-hidden"><div class="px-6 py-4 border-b bg-gray-50"><h3 class="font-medium text-[#7B5936]">Descargar PATs</h3></div>
<div class="overflow-x-auto"><table class="w-full text-sm"><thead class="text-xs text-[#7B5936] uppercase bg-gray-50 border-b"><tr><th class="px-4 py-3">Tutor</th><th class="px-4 py-3">Grupo</th><th class="px-4 py-3 text-center">Alumnos</th><th class="px-4 py-3 text-center">Estado</th><th class="px-4 py-3 text-center">PDF</th></tr></thead>
<tbody id="desc-tbody" class="divide-y"></tbody></table></div></div></div>

</div></main>
<div id="toast-c" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>
<script src="../js/auth.js"></script><script src="../js/layout.js"></script><script src="../js/pdf-utils.js"></script>
<script>
var API='http://localhost:5000/api',sd=window.getSessionData(),miCarrera=(sd&&sd.departamento)||'',periodo=null,carreraId=null,cuats=[];
function sw(t){['doc','asig','seg','desc'].forEach(function(x){document.getElementById('tab-'+x).classList.toggle('hidden',x!==t);var b=document.getElementById('tb-'+x);b.className=x===t?'flex items-center gap-2 px-4 py-2 text-sm font-medium rounded-lg text-[#7B5936] bg-white shadow-sm':'flex items-center gap-2 px-4 py-2 text-sm font-medium rounded-lg text-gray-600 hover:text-gray-900';});if(t==='seg')cargarSeg();if(t==='desc')cargarDesc();if(t==='doc')cargarListDoc();ic();}
function toast(m,ok){var c=document.getElementById('toast-c'),d=document.createElement('div');d.className='flex items-center gap-2 px-4 py-3 rounded-md border shadow-lg pointer-events-auto '+(ok===false?'bg-red-50 border-red-200 text-red-800':'bg-green-50 border-green-200 text-green-800');d.innerHTML='<span class="text-sm font-medium">'+m+'</span>';c.appendChild(d);setTimeout(function(){d.remove();},4000);}
function ic(){if(typeof lucide!=='undefined')lucide.createIcons();}

// === INIT ===
async function init(){
    document.getElementById('in-prog').value=miCarrera;
    document.getElementById('mi-carrera-txt').textContent=miCarrera;
    document.getElementById('d-carrera').value=miCarrera;
    try{
        var pr=await fetch(API+'/periodos/activo');var pd=await pr.json();
        if(pd.success){periodo=pd.periodo;cuats=periodo.cuatrimestres||[];
            document.getElementById('periodo-txt').textContent=periodo.nombre+' (Cuats: '+cuats.join(', ')+')';
            var s=document.getElementById('in-cuat');s.innerHTML='';
            var ord={1:'1er',2:'2do',3:'3er',4:'4to',5:'5to',6:'6to',7:'7mo',8:'8vo',9:'9no'};
            cuats.forEach(function(c){s.innerHTML+='<option value="'+c+'">'+(ord[c]||c)+'</option>';});
        }
        var cr=await fetch(API+'/carreras');var cd=await cr.json();
        if(cd.success){var f=cd.carreras.find(function(c){return c.nombre===miCarrera;});if(f)carreraId=f.id;}
        await cargarDocSelect();await cargarAsig();await cargarListDoc();
    }catch(e){console.error(e);}
    ic();
}

// === ALTA DOCENTES ===
async function cargarListDoc(){
    var tb=document.getElementById('d-tbody');
    try{var r=await fetch(API+'/docentes?carrera='+encodeURIComponent(miCarrera));var d=await r.json();
        document.getElementById('d-count').textContent=(d.docentes?d.docentes.length:0)+' docente(s)';
        if(!d.success||!d.docentes.length){tb.innerHTML='<tr><td colspan="2" class="px-4 py-6 text-center text-gray-400 italic text-xs">Sin docentes.</td></tr>';return;}
        tb.innerHTML=d.docentes.map(function(dc){return '<tr class="hover:bg-gray-50"><td class="px-4 py-3 font-medium text-sm">'+dc.nombre+' '+dc.apellidos+'</td><td class="px-4 py-3 text-xs text-gray-500">'+dc.email+'</td></tr>';}).join('');
    }catch(e){tb.innerHTML='<tr><td colspan="2" class="px-4 py-6 text-center text-red-400 text-xs">Sin conexion</td></tr>';}
}
document.getElementById('form-doc').addEventListener('submit',async function(e){
    e.preventDefault();var msg=document.getElementById('d-msg');var btn=document.getElementById('d-btn');
    btn.disabled=true;btn.textContent='Registrando...';msg.classList.add('hidden');
    try{var r=await fetch(API+'/docentes',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nombre:document.getElementById('d-nom').value.trim(),apellidos:document.getElementById('d-ape').value.trim(),email:document.getElementById('d-email').value.trim().toLowerCase(),departamento:miCarrera})});
        var d=await r.json();
        if(d.success){toast(d.message);this.reset();document.getElementById('d-carrera').value=miCarrera;await cargarListDoc();await cargarDocSelect();}
        else{msg.textContent=d.message;msg.className='text-sm rounded-md px-3 py-2 bg-red-50 text-red-700 border border-red-200';msg.classList.remove('hidden');}
    }catch(e){msg.textContent='Sin conexion';msg.className='text-sm rounded-md px-3 py-2 bg-red-50 text-red-700 border border-red-200';msg.classList.remove('hidden');}
    finally{btn.disabled=false;btn.textContent='Registrar';}
});

// === ASIGNACIONES ===
async function cargarDocSelect(){var s=document.getElementById('in-tutor');try{var r=await fetch(API+'/docentes?carrera='+encodeURIComponent(miCarrera));var d=await r.json();s.innerHTML='<option value="" disabled selected>Selecciona tutor</option>';if(d.success)d.docentes.forEach(function(dc){s.innerHTML+='<option value="'+dc.id+'">'+dc.nombre+' '+dc.apellidos+'</option>';});}catch(e){s.innerHTML='<option>Error</option>';}}

async function cargarAsig(){
    var tb=document.getElementById('asig-tbody');tb.innerHTML='<tr><td colspan="5" class="px-4 py-6 text-center text-gray-400">Cargando...</td></tr>';ic();
    try{
        var ar=await fetch(API+'/asignaciones?carrera='+encodeURIComponent(miCarrera));var ad=await ar.json();
        var pr=await fetch(API+'/pats?carrera='+encodeURIComponent(miCarrera));var pd=await pr.json();
        var pats=pd.success?pd.pats:[];
        if(!ad.success||!ad.asignaciones.length){tb.innerHTML='<tr><td colspan="5" class="px-4 py-8 text-center text-gray-400 italic">Sin asignaciones</td></tr>';return;}
        tb.innerHTML=ad.asignaciones.map(function(a){
            var pat=pats.find(function(p){return p.grupo===a.grupo;});
            var hasPat=!!pat;var estadoPat=hasPat?pat.estado:'Sin PAT';
            var cfg={'Aprobado':'bg-green-100 text-green-700','Pendiente Revision':'bg-yellow-100 text-yellow-700','Borrador':'bg-blue-100 text-blue-700','Rechazado':'bg-red-100 text-red-700','Sin PAT':'bg-gray-100 text-gray-500'};
            var accion=hasPat?'<span class="text-xs text-gray-400">Creado</span>':'<button onclick="crearPAT('+a.id+','+a.cuatrimestre+',\''+a.grupo.replace(/'/g,"\\'")+'\',\''+a.tutor.replace(/'/g,"\\'")+
                '\')" class="px-3 py-1 text-xs bg-[#69B22E] text-white rounded hover:opacity-90 font-medium">Crear PAT</button>';
            return '<tr class="hover:bg-gray-50"><td class="px-4 py-3 font-bold">'+a.grupo+'</td><td class="px-4 py-3">'+a.cuatrimestre+'o</td><td class="px-4 py-3">'+a.tutor+'</td><td class="px-4 py-3 text-center"><span class="px-2 py-0.5 rounded-full text-xs font-medium '+(cfg[estadoPat]||cfg['Sin PAT'])+'">'+estadoPat+'</span></td><td class="px-4 py-3 text-center">'+accion+'</td></tr>';
        }).join('');ic();
    }catch(e){tb.innerHTML='<tr><td colspan="5" class="px-4 py-6 text-center text-red-400">Sin conexion</td></tr>';}
}

document.getElementById('form-asig').addEventListener('submit',async function(e){
    e.preventDefault();if(!carreraId){toast('Carrera no encontrada',false);return;}
    try{var r=await fetch(API+'/asignaciones',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({carrera_id:carreraId,tutor_id:parseInt(document.getElementById('in-tutor').value),grupo:document.getElementById('in-grupo').value.trim().toUpperCase(),cuatrimestre:parseInt(document.getElementById('in-cuat').value)})});var d=await r.json();toast(d.message,d.success);if(d.success){this.reset();document.getElementById('in-prog').value=miCarrera;await cargarAsig();}}catch(e){toast('Error',false);}
});

async function crearPAT(asigId,cuat,grupo,tutor){
    if(!confirm('Crear PAT para '+grupo+' clonando la plantilla publicada?'))return;
    try{var r=await fetch(API+'/pats',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({asignacion_id:asigId,cuatrimestre:cuat,programa_educativo:miCarrera,nombre_tutor:tutor,periodo_cuatrimestral:periodo?periodo.nombre:'',grupo:grupo})});var d=await r.json();toast(d.message,d.success);await cargarAsig();}catch(e){toast('Error',false);}
}

// === SEGUIMIENTO ===
async function cargarSeg(){
    var ct=document.getElementById('seg-container');ct.innerHTML='<div class="text-center text-gray-400 py-8">Cargando...</div>';
    try{var r=await fetch(API+'/pats?carrera='+encodeURIComponent(miCarrera));var d=await r.json();
        if(!d.success||!d.pats.length){ct.innerHTML='<div class="text-center text-gray-400 py-8 italic">Sin PATs</div>';return;}
        ct.innerHTML='';
        for(var i=0;i<d.pats.length;i++){
            var pat=d.pats[i];var dr=await fetch(API+'/pats/'+pat.id);var dd=await dr.json();if(!dd.success)continue;
            var pp=dd.pat;var ses=pp.sesiones||[];
            var val=ses.filter(function(s){return s.estado==='Validada';}).length;
            var canc=ses.filter(function(s){return s.estado==='Cancelada';}).length;
            var card=document.createElement('div');card.className='bg-white rounded-lg border shadow-sm overflow-hidden';
            card.innerHTML='<div class="px-6 py-3 bg-gray-50 border-b flex items-center justify-between"><div><b class="text-[#7B5936]">'+(pp.grupo||'')+'</b> - '+(pp.nombre_tutor||'')+' <span class="text-xs text-gray-500 ml-2">'+pp.estado+'</span></div><div class="flex gap-2 text-xs"><span class="px-2 py-0.5 bg-green-100 text-green-700 rounded">'+val+' validadas</span><span class="px-2 py-0.5 bg-red-100 text-red-700 rounded">'+canc+' canceladas</span><span class="px-2 py-0.5 bg-gray-100 text-gray-600 rounded">'+(ses.length-val-canc)+' pendientes</span></div></div>'+
            '<div class="overflow-x-auto"><table class="w-full text-sm"><thead class="text-xs text-gray-500 uppercase bg-white border-b"><tr><th class="px-3 py-2 text-center">No.</th><th class="px-3 py-2">Tematica</th><th class="px-3 py-2">Fecha/Hora</th><th class="px-3 py-2">Resultados Obtenidos</th><th class="px-3 py-2">Canalizaciones</th><th class="px-3 py-2 text-center">Firma JG</th><th class="px-3 py-2 text-center">Estado</th></tr></thead><tbody class="divide-y">'+
            ses.map(function(s){
                var ec={'Validada':'bg-green-100 text-green-700','Cancelada':'bg-red-100 text-red-700','Finalizada':'bg-yellow-100 text-yellow-700','Pendiente':'bg-gray-100 text-gray-600','Programada':'bg-blue-100 text-blue-700'};
                var firma=s.estado==='Validada'?'<span class="text-green-600 text-xs font-bold">FIRMADO</span>':(s.estado==='Cancelada'?'<span class="text-red-500 text-xs">CANCELADA</span>':'<span class="text-gray-300 text-xs">-</span>');
                var motivo=s.estado==='Cancelada'&&s.motivo_cancelacion?'<br><span class="text-[10px] text-red-600 italic">'+s.motivo_cancelacion+'</span>':'';
                return '<tr class="hover:bg-gray-50"><td class="px-3 py-2 text-center font-bold text-gray-500">'+s.num_sesion+'</td><td class="px-3 py-2 text-xs">'+(s.tematica||'')+'</td><td class="px-3 py-2 text-xs text-gray-600">'+(s.fecha_programada||'Sin agendar')+(s.hora_programada?' '+s.hora_programada:'')+'</td><td class="px-3 py-2 text-xs">'+(s.resultados_obtenidos||'-')+motivo+'</td><td class="px-3 py-2 text-xs text-gray-600">'+(s.canalizaciones||'-')+'</td><td class="px-3 py-2 text-center">'+firma+'</td><td class="px-3 py-2 text-center"><span class="px-2 py-0.5 rounded text-[10px] font-bold '+(ec[s.estado]||ec.Pendiente)+'">'+(s.estado||'Pendiente')+'</span></td></tr>';
            }).join('')+'</tbody></table></div>';
            ct.appendChild(card);
        }
        ic();
    }catch(e){ct.innerHTML='<div class="text-center text-red-400 py-8">Sin conexion</div>';}
}
// === DESCARGAR PDF DIRECTOR DE CARRERA ===
async function dlPDF(id) {
    try {
        var r = await fetch(API+'/pats/'+id);
        var d = await r.json();
        if(!d.success){ alert('Error al obtener el PAT'); return; }
        
        var p = d.pat;
        generarPDFPat({
            carrera: p.programa_educativo || p.carrera || miCarrera,
            tutor: p.nombre_tutor || p.tutor_nombre_completo || '',
            grupo: p.grupo,
            periodo: p.periodo_cuatrimestral || p.periodo_nombre || '',
            h: p.alumnos_h || 0,
            m: p.alumnos_m || 0,
            comentarios: p.comentarios_tutor || '',
            sesiones: p.sesiones || [],
            tipo: 'completo',
            filename: `PAT_${p.grupo}_${(p.nombre_tutor||'').replace(/ /g,'_')}.pdf`
        });
    } catch(e) {
        alert('Error descargando el PDF');
    }
}

// === DESCARGAR ===
async function cargarDesc(){
    var tb=document.getElementById('desc-tbody');
    try{var r=await fetch(API+'/pats?carrera='+encodeURIComponent(miCarrera));var d=await r.json();
        if(!d.success||!d.pats.length){tb.innerHTML='<tr><td colspan="5" class="px-4 py-8 text-center text-gray-400 italic">Sin PATs</td></tr>';return;}
        tb.innerHTML=d.pats.map(function(p){
            var cfg={'Aprobado':'bg-green-100 text-green-700','Pendiente Revision':'bg-yellow-100 text-yellow-700','Borrador':'bg-gray-100 text-gray-600'};
            return '<tr class="hover:bg-gray-50"><td class="px-4 py-3 font-medium">'+(p.nombre_tutor||p.tutor)+'</td><td class="px-4 py-3 font-bold">'+(p.grupo||'')+'</td><td class="px-4 py-3 text-center">'+((p.alumnos_h||0)+(p.alumnos_m||0))+'</td><td class="px-4 py-3 text-center"><span class="px-2 py-0.5 rounded-full text-xs font-medium '+(cfg[p.estado]||'')+'">'+p.estado+'</span></td><td class="px-4 py-3 text-center"><button onclick="dlPDF('+p.id+')" class="px-3 py-1.5 bg-gray-900 text-white rounded text-xs hover:bg-black"><i data-lucide="file-down" class="h-3 w-3 inline mr-1"></i>PDF</button></td></tr>';
        }).join('');ic();
    }catch(e){tb.innerHTML='<tr><td colspan="5" class="px-4 py-6 text-center text-red-400">Sin conexion</td></tr>';}
}
async function dlPDF(id){try{var r=await fetch(API+'/pats/'+id);var d=await r.json();if(!d.success)return;var p=d.pat;generarPDFPat({carrera:p.programa_educativo||p.carrera,tutor:p.nombre_tutor||'',grupo:p.grupo||'',periodo:p.periodo_cuatrimestral||'',h:p.alumnos_h||0,m:p.alumnos_m||0,sesiones:p.sesiones,tipo:'completo',filename:'PAT_'+(p.grupo||'')+'.pdf'});}catch(e){toast('Error PDF',false);}}

init();
</script>
